global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  # Prometheus se monitoriza a sí mismo
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]

  # Métricas del sistema (Node Exporter)
  - job_name: "node-exporter"
    static_configs:
      - targets: ["node-exporter:9100"]

  # Métricas de contenedores (cAdvisor)
  - job_name: "cadvisor"
    static_configs:
      - targets: ["cadvisor:8081"]

  # Métricas de nuestra API
  - job_name: "spring-boot-hospital"
    metrics_path: "/actuator/prometheus"
    static_configs:
      - targets: ["app-hospital:8080"]

alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - alertmanager:9093

rule_files:
  - "/etc/prometheus/alerts.yml"
